{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-8 border border-gray-200 shadow-md rounded-lg mt-10">
    <h2 class="text-3xl font-bold text-center text-gray-800 mb-6">Acesse seu Bolão</h2>
    
    {% if form.errors %}
    <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
        Seu e-mail ou senha estão incorretos. Tente novamente.
    </div>
    {% endif %}
    
    <form method="POST" action="{% url 'login' %}">
        {% csrf_token %}
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2" for="username">E-mail</label>
            <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500" id="username" name="username" type="email" required>
        </div>
        <div class="mb-6">
            <label class="block text-gray-700 text-sm font-bold mb-2" for="password">Senha</label>
            <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 mb-3 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500" id="password" name="password" type="password" required>
        </div>
        <div class="flex items-center justify-between mb-4">
            <button class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline w-full" type="submit">
                ENTRAR
            </button>
        </div>
        <div class="text-right mb-4">
            <a class="inline-block align-baseline font-bold text-sm text-blue-600 hover:text-blue-800" href="{% url 'password_reset' %}">
                Esqueceu a senha?
            </a>
        </div>
    </form>
    
    <div class="text-center mt-4">
        <a class="inline-block align-baseline font-bold text-sm text-blue-600 hover:text-blue-800" href="{% url 'register' %}">
            Ainda não tem conta? Cadastre-se
        </a>
    </div>
</div>
{% endblock %}
